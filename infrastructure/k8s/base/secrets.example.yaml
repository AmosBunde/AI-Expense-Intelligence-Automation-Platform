# Template for the `app-secrets` Secret that every Deployment mounts via
# envFrom. This file is NOT included in kustomization.yaml on purpose —
# never commit real secret values. Create the real Secret out of band:
#
#   kubectl create secret generic app-secrets -n expense-platform \
#     --from-literal=DATABASE_URL='postgresql+asyncpg://USER:PASS@HOST:5432/expense_db' \
#     --from-literal=DATABASE_URL_SYNC='postgresql://USER:PASS@HOST:5432/expense_db' \
#     --from-literal=REDIS_URL='redis://HOST:6379/0' \
#     --from-literal=CELERY_BROKER_URL='redis://HOST:6379/1' \
#     --from-literal=CELERY_RESULT_BACKEND='redis://HOST:6379/2' \
#     --from-literal=OPENAI_API_KEY='sk-...' \
#     --from-literal=JWT_SECRET="$(openssl rand -hex 32)" \
#     --from-literal=INTERNAL_API_TOKEN="$(openssl rand -hex 32)" \
#     --from-literal=S3_BUCKET='expense-documents' \
#     --from-literal=S3_ACCESS_KEY='...' \
#     --from-literal=S3_SECRET_KEY='...'
#
# or manage it with ExternalSecrets / SealedSecrets in real clusters.
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: expense-platform
type: Opaque
stringData:
  DATABASE_URL: postgresql+asyncpg://USER:CHANGE_ME@postgres-host:5432/expense_db
  DATABASE_URL_SYNC: postgresql://USER:CHANGE_ME@postgres-host:5432/expense_db
  REDIS_URL: redis://redis-host:6379/0
  CELERY_BROKER_URL: redis://redis-host:6379/1
  CELERY_RESULT_BACKEND: redis://redis-host:6379/2
  OPENAI_API_KEY: sk-CHANGE_ME
  JWT_SECRET: CHANGE_ME
  INTERNAL_API_TOKEN: CHANGE_ME
  S3_BUCKET: expense-documents
  S3_ACCESS_KEY: CHANGE_ME
  S3_SECRET_KEY: CHANGE_ME
