version: "3.9"

x-common-env: &common-env
  DATABASE_URL: postgresql+asyncpg://expense_user:expense_pass@postgres:5432/expense_db
  DATABASE_URL_SYNC: postgresql://expense_user:expense_pass@postgres:5432/expense_db
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  S3_BUCKET: expense-documents
  S3_ENDPOINT: http://minio:9000
  S3_ACCESS_KEY: minioadmin
  S3_SECRET_KEY: minioadmin
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
  LOG_LEVEL: INFO

services:
  # ---- Infrastructure ----
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: expense_db
      POSTGRES_USER: expense_user
      POSTGRES_PASSWORD: expense_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expense_user -d expense_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Application Services ----
  api-gateway:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.api-gateway
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
      EXPENSE_PROCESSOR_URL: http://expense-processor:8002
      AI_ENGINE_URL: http://ai-engine:8001
      POLICY_ENGINE_URL: http://policy-engine:8003
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    depends_on:
      redis:
        condition: service_healthy
      expense-processor:
        condition: service_started
      ai-engine:
        condition: service_started
      policy-engine:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  expense-processor:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.expense-processor
    ports:
      - "8002:8002"
    environment:
      <<: *common-env
      AI_ENGINE_URL: http://ai-engine:8001
      POLICY_ENGINE_URL: http://policy-engine:8003
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-engine:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.ai-engine
    ports:
      - "8001:8001"
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  policy-engine:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.policy-engine
    ports:
      - "8003:8003"
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy

  celery-worker:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.api-gateway
    command: celery -A tasks:celery_app worker --loglevel=info --concurrency=4 -Q expense_processing,batch_processing,reporting,notifications
    environment:
      <<: *common-env
      EXPENSE_PROCESSOR_URL: http://expense-processor:8002
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  celery-beat:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.api-gateway
    command: celery -A tasks:celery_app beat --loglevel=info
    environment:
      <<: *common-env
    depends_on:
      redis:
        condition: service_healthy

  dashboard-ui:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.dashboard-ui
    ports:
      - "5173:80"
    depends_on:
      api-gateway:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
