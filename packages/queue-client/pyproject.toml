[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "expense-queue-client"
version = "0.1.0"
description = "Celery task definitions and queue routing for the Expense Intelligence Platform"
requires-python = ">=3.11"
dependencies = [
    "celery[redis]>=5.3",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src"]
