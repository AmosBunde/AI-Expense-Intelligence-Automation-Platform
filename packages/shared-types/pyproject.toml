[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "expense-shared-types"
version = "0.1.0"
description = "Shared Pydantic domain models for the Expense Intelligence Platform"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src"]
