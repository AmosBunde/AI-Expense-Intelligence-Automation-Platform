[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "expense-db-client"
version = "0.1.0"
description = "SQLAlchemy ORM models and async database client for the Expense Intelligence Platform"
requires-python = ">=3.11"
dependencies = [
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.29",
    "pgvector>=0.2",
    "alembic>=1.13",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.23",
    "aiosqlite>=0.19",
]

[tool.hatch.build.targets.wheel]
packages = ["src"]
